workflows:
  ios-dev:
    name: iOS Development Build
    max_build_duration: 60
    environment:
      flutter: 3.44.2
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Build iOS (no code signing)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphonesimulator/**/*.app
      - build/ios/iphoneos/**/*.app
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - anas.elhirech33@gmail.com
        notify:
          success: true
          failure: true
