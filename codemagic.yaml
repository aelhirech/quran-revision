workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      flutter: 3.44.2
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.quranrevision.quranRevision
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Build iOS signed
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "External Testers"
      email:
        recipients:
          - anas.elhirech33@gmail.com
        notify:
          success: true
          failure: true
